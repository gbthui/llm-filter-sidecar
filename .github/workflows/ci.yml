name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - run: test -z "$(gofmt -l main.go main_test.go)"
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build --build-arg VERSION=ci -t llm-filter-sidecar:ci .
